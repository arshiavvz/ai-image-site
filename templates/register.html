<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>👤 ثبت‌نام</h1>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="نام کاربری"
            required
        >

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="رمز عبور"
            required
        >

        <br><br>

        <button type="submit">
            ثبت‌نام
        </button>

    </form>

    <br>

    <a href="/">🏠 بازگشت به صفحه اصلی</a>

</div>

</body>
</html>
